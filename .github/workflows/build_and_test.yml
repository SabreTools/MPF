name: Build and Test

on:
    push:
        branches: ["master"]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Free Disk Space (Ubuntu)
              uses: jlumbroso/free-disk-space@v1.3.1
              with:
                  dotnet: false

            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: |
                      8.0.x
                      9.0.x
                      10.0.x

            - name: Run tests
              run: dotnet test

            - name: Run publish script
              run: ./publish-nix.sh -dp

            - name: Update rolling tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag -f rolling
                  git push origin :refs/tags/rolling || true
                  git push origin rolling --force

            - name: Upload to rolling
              uses: ncipollo/release-action@v1.20.0
              with:
                  allowUpdates: True
                  artifacts: "*.nupkg,*.snupkg,*.zip"
                  body: "Last built commit: ${{ github.sha }}

                      ## UI Builds

                      [Windows x64 UI Release](https://github.com/SabreTools/MPF/releases/download/rolling/MPF.UI_net10.0-windows_win-x64_release.zip)

                      [Windows x64 UI Debug](https://github.com/SabreTools/MPF/releases/download/rolling/MPF.UI_net10.0-windows_win-x64_debug.zip)

                      ## Cross-platform UI Builds (Avalonia)

                      [macOS universal .app (signed bundle)](https://github.com/SabreTools/MPF/releases/download/rolling/MPF.UI.Avalonia_macos_universal_release.zip)

                      [macOS arm64 UI Release](https://github.com/SabreTools/MPF/releases/download/rolling/MPF.UI.Avalonia_net10.0_osx-arm64_release.zip)

                      [macOS x64 UI Release](https://github.com/SabreTools/MPF/releases/download/rolling/MPF.UI.Avalonia_net10.0_osx-x64_release.zip)

                      [Linux x64 UI Release](https://github.com/SabreTools/MPF/releases/download/rolling/MPF.UI.Avalonia_net10.0_linux-x64_release.zip)

                      [Windows x64 UI (Avalonia) Release](https://github.com/SabreTools/MPF/releases/download/rolling/MPF.UI.Avalonia_net10.0_win-x64_release.zip)"
                  name: "Rolling Release"
                  prerelease: True
                  replacesArtifacts: True
                  tag: "rolling"
                  updateOnlyUnreleased: True

    # Builds the signed, universal (arm64 + x64) macOS .app on a macOS runner (needs lipo +
    # codesign, which only exist on macOS) and appends it to the same rolling release.
    build-macos-app:
        needs: build
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: Build universal macOS .app
              run: ./MPF.UI.Avalonia/build-macos-app.sh universal

            - name: Zip the .app bundle
              run: |
                  cd MPF.UI.Avalonia/bin
                  zip -ry "$GITHUB_WORKSPACE/MPF.UI.Avalonia_macos_universal_release.zip" MPF.app

            - name: Upload .app to rolling
              uses: ncipollo/release-action@v1.20.0
              with:
                  allowUpdates: True
                  artifacts: "MPF.UI.Avalonia_macos_universal_release.zip"
                  name: "Rolling Release"
                  omitBodyDuringUpdate: True
                  prerelease: True
                  replacesArtifacts: False
                  tag: "rolling"
                  updateOnlyUnreleased: False
