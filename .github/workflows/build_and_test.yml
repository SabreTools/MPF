name: Build and Test

on:
    push:
        branches: ["master", "feature/avalonia-port"]
    pull_request:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Free Disk Space (Ubuntu)
              uses: jlumbroso/free-disk-space@v1.3.1
              with:
                  dotnet: false

            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: |
                      8.0.x
                      9.0.x
                      10.0.x

            - name: Run tests
              run: dotnet test

            - name: Publish Avalonia builds
              run: |
                  mkdir -p artifacts publish

                  dotnet publish MPF.Avalonia/MPF.Avalonia.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false -o publish/linux-x64
                  dotnet publish MPF.Avalonia/MPF.Avalonia.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false -o publish/win-x64
                  dotnet publish MPF.Avalonia/MPF.Avalonia.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false -o publish/osx-arm64

                  (cd publish/linux-x64 && zip -r ../../artifacts/MPF-UI_Avalonia_linux-x64_release.zip .)
                  (cd publish/win-x64 && zip -r ../../artifacts/MPF-UI_Avalonia_win-x64_release.zip .)
                  (cd publish/osx-arm64 && zip -r ../../artifacts/MPF-UI_Avalonia_osx-arm64_release.zip .)

            - name: Update rolling tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag -f rolling
                  git push origin :refs/tags/rolling || true
                  git push origin rolling --force

            - name: Upload to rolling
              uses: ncipollo/release-action@v1.20.0
              with:
                  allowUpdates: True
                  artifacts: "artifacts/*.zip"
                  body: "Last built commit: ${{ github.sha }}

                      ## Avalonia Builds

                      This rolling release contains Avalonia UI build artifacts only."
                  name: "Rolling Release"
                  prerelease: True
                  replacesArtifacts: True
                  tag: "rolling"
                  updateOnlyUnreleased: True
